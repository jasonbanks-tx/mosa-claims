<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Claim Form — MOSA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    padding: 36px 32px;
    width: 100%;
    max-width: 460px;
  }
  .logo {
    text-align: center;
    margin-bottom: 24px;
  }
  .logo h1 {
    font-size: 20px;
    font-weight: bold;
    color: #1a1a1a;
    letter-spacing: 0.5px;
  }
  .logo p {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }
  .divider {
    border: none;
    border-top: 1px solid #e5e5e5;
    margin: 0 0 24px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
  }
  input[type="text"],
  input[type="email"],
  input[type="date"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 15px;
    color: #111;
    margin-bottom: 18px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #1a56db; }
  .send-btn {
    width: 100%;
    padding: 13px;
    background: #1a56db;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s;
  }
  .send-btn:hover { background: #1444b8; }
  .send-btn:disabled { background: #9ab0e8; cursor: not-allowed; }

  #status {
    margin-top: 18px;
    font-size: 14px;
    text-align: center;
    min-height: 20px;
  }
  #status.success { color: #15803d; font-weight: 600; }
  #status.error   { color: #b91c1c; font-weight: 600; }

  .footer {
    text-align: center;
    font-size: 11px;
    color: #aaa;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>MOVERS OF SAN ANTONIO</h1>
    <p>Send Claim Form to Customer</p>
  </div>
  <hr class="divider">

  <form id="claimForm">
    <label for="customerName">Customer Name</label>
    <input type="text" id="customerName" name="customerName" placeholder="Full name" required autocomplete="off">

    <label for="customerEmail">Customer Email</label>
    <input type="email" id="customerEmail" name="customerEmail" placeholder="customer@email.com" required autocomplete="off">

    <label for="jobDate">Date of Job</label>
    <input type="date" id="jobDate" name="jobDate" required>

    <button type="submit" class="send-btn" id="sendBtn">Send Claim Form</button>
  </form>

  <div id="status"></div>

  <div class="footer">Sends from claims.mosa@gmail.com · Logged automatically</div>
</div>

<script>
  document.getElementById('claimForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    const customerName  = document.getElementById('customerName').value.trim();
    const customerEmail = document.getElementById('customerEmail').value.trim();
    const jobDate       = document.getElementById('jobDate').value;

    btn.disabled = true;
    btn.textContent = 'Sending…';
    status.className = '';
    status.textContent = '';

    try {
      const res = await fetch('/api/send-claim', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customerName, customerEmail, jobDate })
      });
      const data = await res.json();
      if (res.ok && data.success) {
        status.className = 'success';
        status.textContent = '✓ Claim form sent to ' + customerEmail;
        document.getElementById('claimForm').reset();
      } else {
        throw new Error(data.error || 'Unknown error');
      }
    } catch (err) {
      status.className = 'error';
      status.textContent = '✗ Failed to send: ' + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Claim Form';
    }
  });
</script>
</body>
</html>
